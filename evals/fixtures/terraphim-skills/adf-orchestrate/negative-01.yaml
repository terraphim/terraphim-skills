  Run this quick Python script in a sandbox and tell me the output.
expected_trigger:
  - terraphim-rlm
must_not_trigger:
  - adf-orchestrate
expected_artifacts:
  - sandboxed-execution
judge_profile: adf-dispatch
baseline: v1
