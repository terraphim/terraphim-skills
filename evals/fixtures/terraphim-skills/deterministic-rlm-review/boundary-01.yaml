id: deterministic-rlm-review-boundary-01
repo: terraphim-skills
target: deterministic-rlm-review
skill_type: encoded_preference
category: boundary-trigger
user_prompt: >
  Look at this 8-file change in the SQL migration runner. Make sure it is
  safe to deploy.
expected_trigger:
  - deterministic-rlm-review
must_not_trigger:
  - structural-pr-review
expected_artifacts:
  - per-role-verdicts
  - reconciled-report
judge_profile: swarm-review
baseline: v1
trigger_signals:
  all_of:
    - "rlm_query"
  any_of:
    - "SecurityAudit"
    - "CodeReview"
    - "migration safety"
    - "reconciliation"
notes: 8 files, deployment-critical, implicit ask for multi-concern review
  (safety = security + correctness + migration). Should add a migration
  safety reviewer role on top of the standard four. Generic word
  "reconcile" alone insufficient -- needs the structured protocol name.

adapter_overrides:
  terraphim-agent:
    role: "AI Dark Factory Author"
